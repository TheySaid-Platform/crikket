name: "crikket"

# Server (Hono API) — handles /api/* and /rpc/* at the LB.
server:
  image: ghcr.io/redpangilinan/crikket-server
  imageTag: "v0.1.3"
  port: 3000
  replicaCount:
    min: 2
    max: 6
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
      ephemeral-storage: "5Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
      ephemeral-storage: "5Gi"
  autoscaling:
    enabled: true
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Web (Next.js dashboard) — receives all non-API traffic at the LB.
web:
  image: ghcr.io/redpangilinan/crikket-web
  imageTag: "v0.1.3"
  port: 3001
  replicaCount:
    min: 2
    max: 4
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
      ephemeral-storage: "5Gi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
      ephemeral-storage: "5Gi"
  autoscaling:
    enabled: true
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# One-shot drizzle migration runs as a Helm post-install/post-upgrade hook
# using the same image as `server`. Disabled when migrations are managed
# elsewhere (e.g. a manual `db:migrate` runbook).
migrate:
  enabled: true
  activeDeadlineSeconds: 600
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# Graceful shutdown — preStop sleep gives the GCLB / NEG time to stop
# routing new traffic before SIGTERM hits the process.
gracefulShutdown:
  preStopSleepSeconds: 15
  terminationGracePeriodSeconds: 45

# Service configuration shared by both server and web.
# `annotations.enabled=true` adds the cloud.google.com/neg annotation so
# each Service exposes a standalone NEG that the GCLB backend service
# attaches to (path-based routing happens at the LB, not the chart).
service:
  type: ClusterIP
  annotations:
    enabled: true

# Environment configuration.
# Secrets (DATABASE_URL, BETTER_AUTH_SECRET, STORAGE_*, GOOGLE_*, etc.)
# come from the named secret via `envFrom`. Non-secret env vars below
# ship as plain values into both server and web pods.
env:
  secretRef:
    name: crikket-secrets

  # Shared (consumed by both server and web)
  NODE_ENV: "production"

  # AlloyDB ships a self-signed CA (CN=root.alloydb). The pg driver
  # rejects it by default with DEPTH_ZERO_SELF_SIGNED_CERT. Mirror the
  # `db-migration` chart's escape hatch and skip CA verification on the
  # outbound DB connection (the link is in-VPC, so this is in-policy
  # for the dev environment).
  NODE_TLS_REJECT_UNAUTHORIZED: "0"

  # Server-only env (Better Auth + capture flags)
  ALLOWED_SIGNUP_DOMAINS: "theysaid.io"
  ENABLE_PAYMENTS: "false"

  # When "true", deployment-web.yaml's command override hides the email/password
  # form, the "Or continue with email" divider, and the "Don't have an account?
  # Sign up" link on /login. UI-only — server-side endpoints stay enabled.
  CRIKKET_HIDE_EMAIL_AUTH_UI: "true"
