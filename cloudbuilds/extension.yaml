# Cloud Build: build the Crikket Chrome extension and publish it to the
# Chrome Web Store on every merge to master.
#
# Trigger: crikket-extension (filter: ^master$, config: cloudbuilds/extension.yaml).
#
# Secret (Google Secret Manager, name: crikket-secrets-extension):
#   A .env-style payload containing:
#     CHROME_EXTENSION_ID=...
#     CHROME_CLIENT_ID=...
#     CHROME_CLIENT_SECRET=...
#     CHROME_REFRESH_TOKEN=...
#
# The Cloud Build service account needs roles/secretmanager.secretAccessor on
# the secret above.

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/crikket-secrets-extension/versions/latest
      env: CRIKKET_SECRETS_EXTENSION

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: install
    name: "oven/bun:1.3.5"
    entrypoint: bun
    args: ["install", "--frozen-lockfile"]

  - id: build-deps
    name: "oven/bun:1.3.5"
    entrypoint: bun
    args: ["run", "turbo", "run", "build", "--filter=@crikket/capture-core"]
    env:
      - "TURBO_TELEMETRY_DISABLED=1"

  - id: publish
    name: "oven/bun:1.3.5"
    dir: apps/extension
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        printf '%s\n' "$$CRIKKET_SECRETS_EXTENSION" > .env
        printf '%s\n' "VITE_APP_URL=https://crikket.dev.theysaid.io" >> .env
        printf '%s\n' "VITE_SERVER_URL=https://crikket.dev.theysaid.io" >> .env
        bun run publish:chrome
    secretEnv: ["CRIKKET_SECRETS_EXTENSION"]
