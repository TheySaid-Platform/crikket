# Cloud Build: build the Crikket web and server Docker images, push to GCR,
# then helm upgrade the dev release with the freshly built SHA tag.
#
# Trigger: crikket-images (filter: ^master$, config: cloudbuilds/crikket-images.yaml).

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: build-web
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -f
      - apps/web/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/crikket-web:$SHORT_SHA
      - .

  - id: build-server
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -f
      - apps/server/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/crikket-server:$SHORT_SHA
      - .

  - id: push-web
    name: gcr.io/cloud-builders/docker
    waitFor: ["build-web"]
    args: ["push", "gcr.io/$PROJECT_ID/crikket-web:$SHORT_SHA"]

  - id: push-server
    name: gcr.io/cloud-builders/docker
    waitFor: ["build-server"]
    args: ["push", "gcr.io/$PROJECT_ID/crikket-server:$SHORT_SHA"]

  - id: deploy
    name: gcr.io/$PROJECT_ID/gcloud-helm:latest
    waitFor: ["push-web", "push-server"]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud container clusters get-credentials $_CLUSTER_NAME \
          --region $_REGION --project $PROJECT_ID

        helm upgrade --install $_SERVICE_NAME ./helm-charts/crikket \
          -n $_NAMESPACE \
          --set name=$_SERVICE_NAME \
          --set server.imageTag=$SHORT_SHA \
          --set web.imageTag=$SHORT_SHA \
          --timeout 10m

timeout: 3600s

substitutions:
  _NAMESPACE: "dev"
  _CLUSTER_NAME: "dev-cluster"
  _REGION: "us-central1"
  _SERVICE_NAME: "crikket"
