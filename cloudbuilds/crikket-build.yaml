steps:
  - name: 'gcr.io/$PROJECT_ID/gcloud-helm:latest'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud container clusters get-credentials $_CLUSTER_NAME --region $_REGION --project $PROJECT_ID

        helm upgrade --install $_SERVICE_NAME ./helm-charts/crikket -n $_NAMESPACE \
          --set name=$_SERVICE_NAME \
          --set server.imageTag=$_SERVER_IMAGE_TAG \
          --set web.imageTag=$_WEB_IMAGE_TAG \
          --set server.replicaCount.min=$_SERVER_MIN_REPLICAS \
          --set server.replicaCount.max=$_SERVER_MAX_REPLICAS \
          --set server.resources.requests.cpu=$_SERVER_CPU_REQUEST \
          --set server.resources.requests.memory=$_SERVER_MEMORY_REQUEST \
          --set server.resources.limits.cpu=$_SERVER_CPU_LIMIT \
          --set server.resources.limits.memory=$_SERVER_MEMORY_LIMIT \
          --set server.autoscaling.enabled=$_SERVER_AUTOSCALING_ENABLED \
          --set web.replicaCount.min=$_WEB_MIN_REPLICAS \
          --set web.replicaCount.max=$_WEB_MAX_REPLICAS \
          --set web.resources.requests.cpu=$_WEB_CPU_REQUEST \
          --set web.resources.requests.memory=$_WEB_MEMORY_REQUEST \
          --set web.resources.limits.cpu=$_WEB_CPU_LIMIT \
          --set web.resources.limits.memory=$_WEB_MEMORY_LIMIT \
          --set web.autoscaling.enabled=$_WEB_AUTOSCALING_ENABLED \
          --set migrate.enabled=$_MIGRATE_ENABLED \
          --set service.annotations.enabled=$_SERVICE_ANNOTATIONS_ENABLED \
          --timeout 10m

substitutions:
  _NAMESPACE: "dev"
  _CLUSTER_NAME: "dev-cluster"
  _REGION: "us-central1"
  _SERVICE_NAME: "crikket"

  # Image tags — pin to a release or git SHA per deploy
  _SERVER_IMAGE_TAG: "v0.1.3"
  _WEB_IMAGE_TAG: "v0.1.3"

  # Server (Hono API)
  _SERVER_MIN_REPLICAS: "2"
  _SERVER_MAX_REPLICAS: "6"
  _SERVER_CPU_REQUEST: "500m"
  _SERVER_MEMORY_REQUEST: "1Gi"
  _SERVER_CPU_LIMIT: "1000m"
  _SERVER_MEMORY_LIMIT: "2Gi"
  _SERVER_AUTOSCALING_ENABLED: "true"

  # Web (Next.js dashboard)
  _WEB_MIN_REPLICAS: "2"
  _WEB_MAX_REPLICAS: "4"
  _WEB_CPU_REQUEST: "250m"
  _WEB_MEMORY_REQUEST: "512Mi"
  _WEB_CPU_LIMIT: "1000m"
  _WEB_MEMORY_LIMIT: "1Gi"
  _WEB_AUTOSCALING_ENABLED: "true"

  # Common
  _MIGRATE_ENABLED: "true"
  _SERVICE_ANNOTATIONS_ENABLED: "true"
